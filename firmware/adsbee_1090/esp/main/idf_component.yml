## IDF Component Manager Manifest File
dependencies:
  espressif/mdns: "*"
  ## Required IDF version
  idf:
    version: ">=4.1.0"
# NOTE: LovyanGFX (GC9A01 display driver, used only when WITH_DISPLAY is defined) is NOT a
# managed registry dependency. The esp-idf build container has no access to the ESP Component
# Registry, and this project vendors deps as git submodules pulled by `just setup`
# (firmware/scripts/setup_dev.sh). LovyanGFX lives at esp/components/LovyanGFX and is
# auto-discovered by ESP-IDF as a local component; main requires it via PRIV_REQUIRES.
  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
